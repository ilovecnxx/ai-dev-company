<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERBLOG // 数字灵魂的容器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0f' width='100' height='100'/><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <!-- Scanline overlay -->
  <div class="scanlines"></div>

  <!-- Grid background -->
  <div class="grid-bg"></div>

  <!-- Floating particles -->
  <canvas id="particles"></canvas>

  <!-- Header -->
  <header class="header" id="header">
    <div class="header-content">
      <a href="/" class="logo">
        <span class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
            <line x1="12" y1="22" x2="12" y2="15.5"/>
            <line x1="22" y1="8.5" x2="12" y2="15.5"/>
            <line x1="2" y1="8.5" x2="12" y2="15.5"/>
          </svg>
        </span>
        <span class="logo-text">CYBER<span class="logo-accent">BLOG</span></span>
      </a>

      <nav class="nav">
        <a href="/" class="nav-link active">POSTS</a>
        <a href="/editor" class="nav-link">CREATE</a>
      </nav>

      <button class="search-btn" id="searchBtn" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <div class="terminal-badge">
        <span class="terminal-dot"></span>
        <span class="terminal-text">NEURAL LINK ESTABLISHED</span>
      </div>
      <h1 class="hero-title">
        <span class="hero-title-line">数字灵魂的</span>
        <span class="hero-title-line accent">容器</span>
      </h1>
      <p class="hero-subtitle">在霓虹与代码的交界处，记录思想的脉冲</p>
    </div>
    <div class="hero-glow"></div>
  </section>

  <!-- Main Content -->
  <main class="main">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          TAGS
        </h3>
        <div class="tag-cloud" id="tagCloud">
          <span class="loading-text">Loading tags...</span>
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12,6 12,12 16,14"/>
          </svg>
          RECENT
        </h3>
        <div class="recent-posts" id="recentPosts">
          <span class="loading-text">Scanning...</span>
        </div>
      </div>
    </aside>

    <section class="posts-grid" id="postsGrid">
      <!-- Posts will be loaded here -->
    </section>
  </main>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display: none;">
    <div class="empty-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
    </div>
    <h2 class="empty-title">VOID SIGNAL</h2>
    <p class="empty-text">No posts found in this frequency range</p>
  </div>

  <!-- Search Modal -->
  <div class="search-modal" id="searchModal">
    <div class="search-modal-content">
      <div class="search-header">
        <div class="search-input-wrapper">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search the archives..." autocomplete="off">
          <span class="search-shortcut">ESC</span>
        </div>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-hint">
          <span class="search-hint-text">Type to search across all posts</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-terminal">
        <span class="footer-prompt">root@cyberblog:~#</span>
        <span class="footer-text" id="footerText"></span>
        <span class="footer-cursor">_</span>
      </div>
      <div class="footer-meta">
        <span>CYBERBLOG v1.0</span>
        <span>//</span>
        <span>BUILT WITH NEURAL NETWORKS</span>
      </div>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
